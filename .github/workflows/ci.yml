name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version number (e.g. 64)"
        required: true
        type: string

env:
  DOTNET_VERSION: 10.0.x

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore
      - run: dotnet build --configuration Release --no-restore
      - run: dotnet test SS14.Launcher.Tests/SS14.Launcher.Tests.csproj -v n

  release:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.tag.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Patch version
        run: |
          sed -i 's/CurrentLauncherVersion\s*=\s*"[^"]*"/CurrentLauncherVersion = "${{ inputs.version }}"/' \
            SS14.Launcher/ConfigConstants.cs
          echo "Patched version to ${{ inputs.version }}"

      - name: Build & Test
        run: |
          dotnet restore
          dotnet build --configuration Release --no-restore
          dotnet test SS14.Launcher.Tests/SS14.Launcher.Tests.csproj -v n

      - name: Build macOS & Linux
        run: python publish.py osx linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: ./SS14.Launcher_Linux.zip
          retention-days: 1

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: ./SS14.Launcher_macOS.zip
          retention-days: 1

  build-windows:
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-2022
    needs: release
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Patch version
        shell: bash
        run: |
          sed -i 's/CurrentLauncherVersion\s*=\s*"[^"]*"/CurrentLauncherVersion = "${{ inputs.version }}"/' \
            SS14.Launcher/ConfigConstants.cs
          echo "Patched version to ${{ inputs.version }}"

      - name: Build Windows
        run: python publish.py windows --x64-only

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: ./SS14.Launcher_Windows.zip
          retention-days: 1

  publish:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [release, build-windows]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Verify artifacts
        run: |
          echo "=== Artifacts ==="
          find . -name "*.zip" -type f
          for f in linux/SS14.Launcher_Linux.zip windows/SS14.Launcher_Windows.zip macos/SS14.Launcher_macOS.zip; do
            if [ ! -f "$f" ]; then
              echo "ERROR: Missing $f"
              exit 1
            fi
            echo "OK: $f ($(stat -c%s "$f") bytes)"
          done

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ inputs.version }}"
          LATEST_TAG=$(git tag --sort=-creatordate | head -1)
          echo "Latest tag: $LATEST_TAG"
          NOTES="## Release v${VERSION}"
          if [ -n "$LATEST_TAG" ]; then
            NOTES+="\n\n### Changes since $LATEST_TAG\n"
            NOTES+="$(git log $LATEST_TAG..HEAD --pretty=format:"* %s (%an)" 2>/dev/null || echo "* Initial release")"
          else
            NOTES+="\n\n### Commits\n"
            NOTES+="$(git log --pretty=format:"* %s (%an)")"
          fi
          NOTES+="\n\n### Downloads\n"
          NOTES+="| Platform | File |\n"
          NOTES+="|----------|------|\n"
          NOTES+="| Windows | SS14.Launcher_Windows.zip |\n"
          NOTES+="| Linux | SS14.Launcher_Linux.zip |\n"
          NOTES+="| macOS | SS14.Launcher_macOS.zip |\n"
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo -e "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate info.json
        run: |
          mkdir -p _site/launcher-data
          cat > _site/launcher-data/info.json << EOF
          {
            "messages": {
              "en-US": [
                "Welcome to Space Station 14!",
                "Enjoy your stay!",
                "Report bugs on GitHub.",
                "Have fun and be nice!"
              ]
            },
            "allowedVersions": [
              "${{ inputs.version }}"
            ],
            "overrideAssets": {}
          }
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: "Release v${{ inputs.version }}"
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: false
          files: |
            linux/SS14.Launcher_Linux.zip
            windows/SS14.Launcher_Windows.zip
            macos/SS14.Launcher_macOS.zip
            _site/launcher-data/info.json
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
          name: pages-${{ github.run_id }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: pages-${{ github.run_id }}
