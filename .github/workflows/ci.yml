name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version number (e.g. 64)"
        required: true
        type: string

env:
  DOTNET_VERSION: 10.0.x

jobs:
  test:
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore
      - run: dotnet build --configuration Release --no-restore
      - run: dotnet test SS14.Launcher.Tests/SS14.Launcher.Tests.csproj -v n

  release:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.tag.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build & Test
        run: |
          dotnet restore
          dotnet build --configuration Release --no-restore
          dotnet test SS14.Launcher.Tests/SS14.Launcher.Tests.csproj -v n

      - name: Build macOS & Linux
        run: python publish.py osx linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: ./SS14.Launcher_Linux.zip
          retention-days: 1

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: ./SS14.Launcher_macOS.zip
          retention-days: 1

  build-windows:
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-2022
    needs: release
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build Windows
        run: python publish.py windows --x64-only

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: ./SS14.Launcher_Windows.zip
          retention-days: 1

  publish:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [release, build-windows]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Verify artifacts
        run: |
          echo "=== Artifacts ==="
          find . -name "*.zip" -type f
          for f in linux/SS14.Launcher_Linux.zip windows/SS14.Launcher_Windows.zip macos/SS14.Launcher_macOS.zip; do
            if [ ! -f "$f" ]; then
              echo "ERROR: Missing $f"
              exit 1
            fi
            echo "OK: $f ($(stat -c%s "$f") bytes)"
          done

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ inputs.version }}"
          LATEST_TAG=$(git tag --sort=-creatordate | head -1)
          echo "Latest tag: $LATEST_TAG"
          NOTES="## Release v${VERSION}"
          if [ -n "$LATEST_TAG" ]; then
            NOTES+="\n\n### Changes since $LATEST_TAG\n"
            NOTES+="$(git log $LATEST_TAG..HEAD --pretty=format:"* %s (%an)" 2>/dev/null || echo "* Initial release")"
          else
            NOTES+="\n\n### Commits\n"
            NOTES+="$(git log --pretty=format:"* %s (%an)")"
          fi
          NOTES+="\n\n### Downloads\n"
          NOTES+="| Platform | File |\n"
          NOTES+="|----------|------|\n"
          NOTES+="| Windows | SS14.Launcher_Windows.zip |\n"
          NOTES+="| Linux | SS14.Launcher_Linux.zip |\n"
          NOTES+="| macOS | SS14.Launcher_macOS.zip |\n"
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo -e "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create tag
        id: tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG_NAME="v${{ inputs.version }}"
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: "Release v${{ inputs.version }}"
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: false
          files: |
            linux/SS14.Launcher_Linux.zip
            windows/SS14.Launcher_Windows.zip
            macos/SS14.Launcher_macOS.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
